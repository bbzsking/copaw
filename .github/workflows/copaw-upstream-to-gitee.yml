name: copaw-upstream-to-gitee

on:
  schedule:
    - cron: '1 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git Identity
        run: |
          git config --global user.email "zhangbinbinhi@outlook.com"
          git config --global user.name "bbzsking"

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Sync from upstream
        run: |
          git remote add upstream https://github.com/agentscope-ai/CoPaw.git
          git fetch upstream main
          # 确保在 main 分支
          git checkout main
          # 如果本地有未推送的提交，先记录（通常此工作流不应有）
          LOCAL_BEHIND=$(git rev-list --count HEAD..upstream/main)
          if [ "$LOCAL_BEHIND" -eq 0 ]; then
            echo "Local is up to date with upstream. No sync needed."
            exit 0
          fi
          # 执行合并（允许快进，但如果有本地修改会报错，符合预期）
          git merge upstream/main --no-edit
          # 如果 merge 成功，推送
          git push origin main

