name: copaw-upstream-to-gitee

on:
  schedule:
    - cron: '1 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git Identity
        run: |
          git config --global user.email "zhangbinbinhi@outlook.com"
          git config --global user.name "bbzsking"

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Sync from upstream
        run: |
          git remote add upstream https://github.com/agentscope-ai/CoPaw.git 
          git fetch upstream main
          
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          
          if [ "$LOCAL_COMMIT" = "$UPSTREAM_COMMIT" ]; then
            echo "No updates from upstream. Skipping."
            exit 0
          fi
          
          echo "Upstream has new commits: $UPSTREAM_COMMIT"
          
          # 直接 --no-ff 合并，无论是否能快进都创建合并提交
          git checkout main
          git merge upstream/main --no-ff --no-edit -m "sync: merge upstream $(date +%Y-%m-%d)"
          
          git push origin main
          echo "Synced to GitHub main branch"

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/elvesking/firmware-agent.git
          git push -f gitee main:main
          echo "Pushed to Gitee main branch"
